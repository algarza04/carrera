user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /var/run/nginx.pid;

events {
	worker_connections 1024;
}

http {
    upstream backend_algarza04 {
    	server 192.168.10.2 weight=1 max_fails=3 fail_timeout=30s;
        server 192.168.10.3 weight=1 max_fails=3 fail_timeout=30s;
        server 192.168.10.4 weight=4 max_fails=3 fail_timeout=30s;
        server 192.168.10.5 weight=2 max_fails=3 fail_timeout=30s;
        server 192.168.10.6 weight=1 max_fails=3 fail_timeout=30s;
        server 192.168.10.7 weight=8 max_fails=3 fail_timeout=30s;
        server 192.168.10.8 weight=1 max_fails=3 fail_timeout=30s;
        server 192.168.10.9 weight=1 max_fails=3 fail_timeout=30s;
    }
    server{
        listen 80;
        server_name nginx_algarza04;

        access_log /var/log/nginx/nginx_algarza04.access.log;
        error_log /var/log/nginx/nginx_algarza04.error.log;
        location / {
            proxy_pass http://backend_algarza04;
            proxy_set_header Cookie $http_cookie;
            proxy_hide_header Set-Cookie;
        }
        location /estadisticas_algarza04 {
            stub_status on;
        }
    }
}
