user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /var/run/nginx.pid;

events {
	worker_connections 1024;
}

http {
    upstream backend_algarza04 {
        least_conn;
    	server 192.168.10.2;
        server 192.168.10.3;
        server 192.168.10.4;
        server 192.168.10.5;
        server 192.168.10.6;
        server 192.168.10.7;
        server 192.168.10.8;
        server 192.168.10.9;
    }
    server{
        listen 80;
        server_name nginx_algarza04;

        access_log /var/log/nginx/nginx_algarza04.access.log;
        error_log /var/log/nginx/nginx_algarza04.error.log;
        location / {
            proxy_pass http://backend_algarza04;
            proxy_set_header Cookie $http_cookie;
            proxy_hide_header Set-Cookie;
        }
        location /estadisticas_algarza04 {
            stub_status on;
        }
    }
}
