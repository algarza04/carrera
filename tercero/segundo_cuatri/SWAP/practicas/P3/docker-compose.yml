# inicialización de las redes web y servicios
networks:
  red_web:
    name: red_web
    ipam:
      config:
        - subnet: 192.168.10.0/24
  red_servicios:
    name: red_servicios
    ipam:
      config:
        - subnet: 192.168.20.0/24

services:
  # inicialización del contenedores web1:
  # -es creado a partir del Dockerfile de apache
  # -se le asigna su nombre e imagen
  # -se asigna un puerto (HTTPS)
  # -se asignan los volumenes (dir web que posee el php y dir que posee los certificados)
  # -se asignan las redes (red_web y red_servicios) con su ip estática correspondiente
  web1:
    build:
      context: .
      dockerfile: P3-algarza04-apache/DockerfileApache_algarza04
    image: algarza04-apache-image:p3
    container_name: web1
    ports:
      - 8081:443
    volumes:
      - ./P3-algarza04-apache/web_algarza04:/var/www/html
      - ./P3-algarza04-certificados:/etc/apache2/ssl/
    networks:
      red_web:
        ipv4_address: 192.168.10.2
      red_servicios:
        ipv4_address: 192.168.20.2

  # inicialización del contenedores web2:
