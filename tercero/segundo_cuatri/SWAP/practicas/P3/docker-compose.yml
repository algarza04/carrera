  # inicialización del balanceador-nginx-ssl:
  # -se crea a partir del Dockerfile de nginx
  # -se le asigna su nombre e imagen
  # -se asigna un puerto (asociado al puerto HTTPS del contenedor, ya que servirá las peticiones de forma segura)
  # -se asignan los volumenes (dir que posee los certificados y dir que posee el archivo de configuración del balanceador)
  # -se asigna la red_web con su ip estática correspondiente
  # -se asigna la dependencia de los contenedores web1-8 (ya que el balanceador no puede iniciar sin ellos inicializados)
  balanceador-nginx-ssl:
    build:
      context: .
      dockerfile: P3-algarza04-nginx/DockerfileNginx_algarza04
    image: algarza04-nginx-image:p3
    container_name: balanceador-nginx
    ports:
      - 8090:443
    volumes:
      - ./P3-algarza04-certificados:/etc/nginx/ssl/
      - ./P3-algarza04-nginx/algarza04-nginx-ssl.conf:/etc/nginx/nginx.conf
    networks:
      red_web:
        ipv4_address: 192.168.10.50
    depends_on:
      - web1
      - web2
      - web3
      - web4
      - web5
      - web6
      - web7
      - web8
