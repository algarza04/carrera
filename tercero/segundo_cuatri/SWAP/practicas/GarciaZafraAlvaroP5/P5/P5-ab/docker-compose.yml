# establecemos la red web como externa
networks:
  red_web:
    external: true

services:
  # inicialización del contenedor apache-benchmark-P5:
  # -es creado a partir del DockerFileAB
  # -se le asigna su nombre e imagen
  # -se asigna la red web con su ip estática correspondiente
  apache-benchmark-P5:
    build:
      context: .
      dockerfile: DockerFileAB
    image: algarza04-ab-image:p5
    container_name: apache_benchmark-P5
    networks:
      red_web:
        ipv4_address: 192.168.10.60