<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 5.13</title>
    <style type="text/css">
        label { display:block; }
    </style>
</head>
<body>
    <h1>Registro de usuarios</h1>
    <form action="../ficheros/procesar2.php" method="POST" enctype="multipart/form-data">       <!--el enctype se encarga de permitir la subida de datos-->     
        <label>Nombre: 
            <input type="text" name="nombre" size="16" required placeholder="El nombre es obligatorio">
        </label>  
        <label>Apellidos: 
            <input type="text" name="apellidos" size="20" placeholder="Este campo es opcional">
        </label>
        <label>Control de acceso: 
            <input type="password" name="clave" maxlength="8" size="10" required placeholder="Escriba la clave">
        </label>

        <label>Nacionalidad: 
            <input type="text" name="nacionalidad" value="España">
        </label>
        <label>E-mail: 
            <input type="email" name="email" required placeholder="e-mail obligatorio" >
        </label>

        <label>Sexo:
        <select name="sexo">
            <option>Masculino</option>
            <option>Femenino</option> 
            <option selected value="NA">No deseo responder</option>
        </select></label>
        <label>Almacenamiento de datos:
        <select name="datos almacenados">
            <option value="TOTAL">Acepta el almacenamiento de mis datos y el envío a terceros</option>
            <option value="PARCIAL">Acepta el almacenamiento de mis datos pero no el envío a terceros</option>
            <option value="NINGUNO">No acepta el almacenamiento ni el envío de datos a terceros</option>
        </select>
        </label>

        <p>Idioma para comunicaciones: </p>   
        <label><input type="radio" name="idioma" value="Español" checked>Español</label>
        <label><input type="radio" name="idioma" value="Inglés">Inglés</label>
        <label><input type="radio" name="idioma" value="Francés">Francéss</label>

        <p>Aficiones: </p>
        <label><input type="checkbox" name="aficiones[]" value="música" >La música</label>
        <label><input type="checkbox" name="aficiones[]" value="leer" >Leer libros</label>
        <label><input type="checkbox" name="aficiones[]" value="cine" >El cine</label>
        <label><input type="checkbox" name="aficiones[]" value="deporte" >El deporte</label>
    
        <label>Fecha de nacimiento: 
            <input type="date" name="fecha_nacimiento" required>
        </label>
        <label>Semana Santa:
            <input type="week" name="Semana Santa">
        </label>
        
        <input type="hidden" name="version" value="1.0">

        <label>Fotografía:
            <input type="file" name="foto">
        </label>

        <input type="submit" value="Enviar datos" name="envio">
    </form>
</body>
</html>
