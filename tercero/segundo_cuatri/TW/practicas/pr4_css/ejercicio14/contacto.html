<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
    <link rel="stylesheet" href="ejercicio14.css">
</head>
<body>
    <header>
        <img src="imagenes/log_centro.png" alt="Logotipo centro">
        <h1>Formulario de Contacto</h1>
    </header>

    <main>
        <h2>Contacto para preguntas, problemas y sugerencias</h2>
        <form action="../ficheros/procesar.php" method="get">
            <label>E-mail:
                <input type="email" name="email" id="email" size="30" placeholder="e-mail obligatorio" required>
            </label>

            <label>Asunto:
                <input type="text" name="asunto" size="30" placeholder="Asunto" required>
            </label>
            
            <label>Mensaje:
                <textarea name="mensaje" cols="25" rows="10" placeholder="Escriba su mensaje" required></textarea>
            </label>
            
            <fieldset>
                <input type="submit" value="Enviar mensaje">
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 ETSIIT - Universidad de Granada</p>
        <a href="adaptabilidad.html">Características de CSS adaptable</a>
    </footer>
</body>
</html>
