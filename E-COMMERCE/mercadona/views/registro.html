{% extends "base.html" %} {% block title %} Formulario de Registro {% endblock
%} {% block content %}
<div
  class="container wrapper d-flex align-items-center justify-content-center h-100"
>
  <div class="card login-form">
    <div class="card-body">
      <h5 class="card-title text-center">Formulario de Registro</h5>

      {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
      {% endif %} 

      <form method="POST" action="/usuarios/registro">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control {% if error %}is-invalid{% endif %}"
            id="username"
            name="username"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control {% if error %}is-invalid{% endif %}"
            id="password"
            name="password"
            required
          />
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label"
            >Confirmar Password</label
          >
          <input
            type="password"
            class="form-control {% if error %}is-invalid{% endif %}"
            id="confirmPassword"
            name="confirmPassword"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3 btn_registro_login">
          Registrarse
        </button>

        <div class="text-center mt-4">
          ¿Ya tienes cuenta? <a href="/usuarios/login">Inicia sesión</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
